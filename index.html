<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ⚠️ REPLACE THE TWO STRINGS BELOW -->
    <script>
        const API_KEY = "$2a$10$6sdqD84mGOrtV0iQCoqEiuwm6NLY/wQMAh7VUfRzQNiF13gTLRTaO"; 
        const BIN_ID = "69f760f036566621a81de7ab";   
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Daily Time Record</title>
    <style>
        :root {
            --primary: #dc2626;
            --primary-hover: #b91c1c;
            --bg: #fef2f2;
            --card: #ffffff;
            --text: #1e1b4b;
            --text-secondary: #7f1d1d;
            --border: #fecaca;
            --success: #16a34a;
            --danger: #ef4444;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(220, 38, 38, 0.1), 0 8px 10px -6px rgba(220, 38, 38, 0.05);
            border: 1px solid var(--border);
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        h2 {
            margin: 0 0 8px 0;
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
        }
        #clock {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            background: #fff5f5;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: #fffafb;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.15); }
        button:active { transform: translateY(0); }
        .btn-in { background-color: var(--success); color: white; }
        .btn-in:hover { background-color: #15803d; }
        .btn-out { background-color: var(--danger); color: white; }
        .btn-out:hover { background-color: var(--primary-hover); }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
            background: white;
        }
        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        th { 
            background-color: #fff5f5; 
            font-weight: 700;
            color: var(--text-secondary);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fffafb; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-in { background-color: #d1fae5; color: #065f46; }
        .status-out { background-color: #fee2e2; color: #991b1b; }
        
        .metric-badge {
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .positive { background-color: #d1fae5; color: #065f46; }
        .negative { background-color: #fee2e2; color: #991b1b; }
        .neutral { background-color: #f1f5f9; color: #475569; }

        #loading-text {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>STUDENT DAILY TIME RECORD</h2>
        <div id="clock">Loading Time...</div>
    </div>
    
    <div class="form-group">
        <label for="emp-name">Student Name or ID</label>
        <input type="text" id="emp-name" placeholder="Enter your name or ID number">
    </div>
    
    <div class="controls">
        <button class="btn-in" onclick="clockIn()">⏱️ Clock In</button>
        <button class="btn-out" onclick="clockOut()">⏱️ Clock Out</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Total Hours</th>
                    <th>Late (Mins)</th>
                    <th>Undertime</th>
                    <th>Overtime</th>
                </tr>
            </thead>
            <tbody id="dtr-log">
                <tr><td colspan="8" id="loading-text">Connecting to cloud storage...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // System Rules (8:00 AM to 5:00 PM)
    const SCHEDULE_IN_HOUR = 8;  
    const SCHEDULE_OUT_HOUR = 17; 
    const WORK_HOURS_REQUIRED = 8; 

    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('clock').innerText = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function clockIn() { logTime('IN'); }
    function clockOut() { logTime('OUT'); }

    document.addEventListener('DOMContentLoaded', fetchLogs);

    async function fetchLogs() {
        const url = "https://jsonbin.io" + BIN_ID + "/latest";
        try {
            const response = await fetch(url, {
                method: "GET",
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await response.json();
            
            if (data.record && data.record.logs) {
                displayLogs(data.record.logs);
            } else {
                displayLogs([]);
            }
        } catch (error) {
            console.error("Error fetching logs:", error);
            displayLogs([]);
        }
    }

    async function logTime(type) {
        const empName = document.getElementById('emp-name').value.trim();
        
        if (!empName) {
            alert("Please enter your Student Name or ID first!");
            return;
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const url = "https://jsonbin.io" + BIN_ID;

        try {
            const getResponse = await fetch(url + "/latest", {
                method: "GET",
                headers: { "X-Master-Key": API_KEY }
            });
            const getData = await getResponse.json();
            
            let currentLogs = [];
            if (getData.record && getData.record.logs) {
                currentLogs = getData.record.logs;
            }

            let existingIndex = currentLogs.findIndex(log => log.employee === empName && log.date === dateStr);

            if (type === 'IN') {
                if (existingIndex !== -1 && currentLogs[existingIndex].timeIn) {
                    alert("You have already clocked in for today!");
                    return;
                }
                
                // Track Lateness (Mins past 8:00 AM)
                let lateMinutes = 0;
                const scheduleIn = new Date(now);
                scheduleIn.setHours(SCHEDULE_IN_HOUR, 0, 0, 0);
                
                if (now > scheduleIn) {
                    const diffMs = now - scheduleIn;
                    lateMinutes = Math.floor(diffMs / (1000 * 60));
                }

                const newEntry = { 
                    employee: empName, 
                    date: dateStr, 
                    timeIn: timeStr, 
                    timeInRaw: now.toISOString(), 
                    timeOut: null, 
                    hours: '--',
                    late: lateMinutes,
                    undertime: '--',
                    overtime: '--'
                };
                currentLogs.unshift(newEntry);
            } 
            else if (type === 'OUT') {
                if (existingIndex === -1) {
                    alert("No Clock In record found for today. Please clock in first!");
                    return;
                }
                if (currentLogs[existingIndex].timeOut) {
                    alert("You have already clocked out for today!");
                    return;
                }

                currentLogs[existingIndex].timeOut = timeStr;
                
                const timeInObj = new Date(currentLogs[existingIndex].timeInRaw);
                const diffMs = now - timeInObj;
                const totalHours = diffMs / (1000 * 60 * 60);
                
                // Auto 1 hour deduction for lunch if shift crossed 5 hours
                const activeHours = totalHours > 5 ? totalHours - 1 : totalHours;
                currentLogs[existingIndex].hours = activeHours.toFixed(2) + " hrs";

                // Track Undertime (Leaving before 5:00 PM)
                let undertimeStr = "0.00 hrs";
                const scheduleOut = new Date(now);
                scheduleOut.setHours(SCHEDULE_OUT_HOUR, 0, 0, 0);

                if (now < scheduleOut) {
                    const underMs = scheduleOut - now;
                    undertimeStr = (underMs / (1000 * 60 * 60)).toFixed(2) + " hrs";
                }
                currentLogs[existingIndex].undertime = undertimeStr;

                // Track Overtime (Hours over required 8 hours)
                let overtimeStr = "0.00 hrs";
                if (activeHours > WORK_HOURS_REQUIRED) {
                    overtimeStr = (activeHours - WORK_HOURS_REQUIRED).toFixed(2) + " hrs";
                }
                currentLogs[existingIndex].overtime = overtimeStr;
            }

            const updateResponse = await fetch(url, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify({ logs: currentLogs })
            });

            if (!updateResponse.ok) throw new Error("Cloud rejected the update.");

            displayLogs(currentLogs);
            alert(`Successfully clocked ${type}!`);
        } catch (error) {
            console.error("Error saving log:", error);
            alert("Connection error! Please make sure your Master Key and Bin ID are mapped properly.");
        }
    }

    function displayLogs(logs) {
        const logTable = document.getElementById('dtr-log');
        if (!logTable) return;
        logTable.innerHTML = '';
        
        if (logs.length === 0) {
            logTable.innerHTML = '<tr><td colspan="8" style="text-align:center;">No logs recorded yet.</td></tr>';
            return;
        }
        
        logs.forEach(log => {
            const isLate = parseInt(log.late) > 0;
            const hasUndertime = parseFloat(log.undertime) > 0;
            const hasOvertime = parseFloat(log.overtime) > 0;

            const row = `<tr>
                <td style="font-weight:600;">${log.employee || 'N/A'}</td>
                <td>${log.date || ''}</td>
                <td>${log.timeIn ? `<span class="status-badge status-in">IN</span> ${log.timeIn}` : '--'}</td>
                <td>${log.timeOut ? `<span class="status-badge status-out">OUT</span> ${log.timeOut}` : '--'}</td>
                <td style="font-weight:bold; color:var(--primary);">${log.hours || '--'}</td>
                <td><span class="metric-badge ${isLate ? 'negative' : 'neutral'}">${log.late || 0}m</span></td>
                <td><span class="metric-badge ${hasUndertime ? 'negative' : 'neutral'}">${log.undertime || '--'}</span></td>
                <td><span class="metric-badge ${hasOvertime ? 'positive' : 'neutral'}">${log.overtime || '--'}</span></td>
            </tr>`;
            logTable.innerHTML += row;
        });
    }
</script>

</body>
</html>
