<head>
    <title>Coronacion DTR System</title>
    <style>
        body {
            background-color: #ff9999; /* light red background */
            font-family: "Times New Roman", serif;
            margin: 0;
            padding: 20px;
        }

        /* I used a table for the main layout to keep it centered */
        .main-container {
            background-color: white;
            width: 850px;
            margin-left: auto;
            margin-right: auto;
            border: 5px solid darkred;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            border-bottom: 2px solid red;
            margin-bottom: 20px;
        }

        .clock-display {
            background-color: #ffdada;
            border: 1px dashed red;
            padding: 10px;
            margin-bottom: 20px;
        }

        /* simple table styles */
        .data-table {
            width: 100%;
            border: 1px solid black;
        }

        .data-table th {
            background-color: red;
            color: white;
            border: 1px solid black;
        }

        .data-table td {
            border: 1px solid gray;
            text-align: center;
            padding: 5px;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .my-button {
            padding: 10px;
            background-color: red;
            color: white;
            font-weight: bold;
            width: 120px;
        }

        .active-text {
            color: green;
            font-weight: bold;
        }

        #msg-box {
            font-weight: bold;
            color: darkred;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1>Coronacion's Student Daily Time Record</h1>
        <p>Shift: Mon-Thu (8:00 AM to 5:00 PM) | Fri-Sun: NO CLASSES</p>
    </div>

    <div class="clock-display">
        <center>
            <h2 id="live-date">Date here</h2>
            <h1 id="live-time" style="font-size: 50px;">Time here</h1>
        </center>
    </div>

    <!-- This is where the student types their info -->
    <div style="background-color: #eeeeee; padding: 15px; border: 1px solid black;">
        <center>
            <div class="input-group">
                Student Number: <input type="text" id="s_num" placeholder="24-00376">
            </div>
            <div class="input-group">
                Full Name: <input type="text" id="s_name" placeholder="John Paul C. Coronacion">
            </div>
            
            <div id="msg-box"></div>

            <button class="my-button" onclick="doTimeIn()">TIME IN</button>
            <button class="my-button" onclick="doTimeOut()">TIME OUT</button>
        </center>
    </div>

    <br>
    <h3>ACTIVE STUDENTS (STILL INSIDE)</h3>
    <table class="data-table">
        <tr>
            <th>Student No.</th>
            <th>Student Name</th>
            <th>Arrival Time</th>
            <th>Status</th>
        </tr>
        <tbody id="active-list"></tbody>
    </table>

    <br>
    <h3>DTR HISTORY LOGS</h3>
    <table class="data-table">
        <tr>
            <th>Date</th>
            <th>Student No.</th>
            <th>Name</th>
            <th>In</th>
            <th>Out</th>
            <th>OT</th>
            <th>UT</th>
        </tr>
        <tbody id="history-list"></tbody>
    </table>
</div>

<script>
    // I copied this clock part from a tutorial online
    function updateMyClock() {
        var now = new Date();
        var timeStr = now.toLocaleTimeString();
        var dateStr = now.toDateString();
        document.getElementById('live-time').innerHTML = timeStr;
        document.getElementById('live-date').innerHTML = dateStr;
    }
    setInterval(updateMyClock, 1000);

    // Save and Load logic using simple variables
    function getSavedData() {
        var stuff = localStorage.getItem('dtr_data_file');
        if (stuff == null) {
            return [];
        } else {
            return JSON.parse(stuff);
        }
    }

    // naglagay ako ng fake data para example 
    function addMyOwnData() {
        var allData = getSavedData();
        var found = false;

        for (var i = 0; i < allData.length; i++) {
            if (allData[i].date == "2026-04-27" && allData[i].num == "24-00376") {
                found = true;
            }
        }

        if (found == false) {
            var myLog = {
                date: "2026-04-27",
                num: "24-00376",
                name: "John Paul C. Coronacion",
                tIn: "04:28 PM",
                tOut: "05:12 PM",
                ot: "12 mins",
                ut: "8 hrs 28 mins"
            };
            allData.push(myLog);
            localStorage.setItem('dtr_data_file', JSON.stringify(allData));
        }
    }

    function doTimeIn() {
        var d = new Date();
        var day = d.getDay(); // 0 is sunday, 5 is friday

        // ERROR: No classes on Fri, Sat, Sun
        if (day == 5 || day == 6 || day == 0) {
            document.getElementById('msg-box').innerHTML = "ERROR: No classes today!";
            return;
        }

        var s_num = document.getElementById('s_num').value;
        var s_name = document.getElementById('s_name').value;

        if (s_num == "" || s_name == "") {
            alert("Please input your details first!");
            return;
        }

        var currentTime = d.toLocaleTimeString();
        var currentDate = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();

        var allData = getSavedData();
        
        // make sure not already logged in
        for(var i = 0; i < allData.length; i++) {
            if(allData[i].date == currentDate && allData[i].num == s_num && allData[i].tOut == "--") {
                alert("You are already active!");
                return;
            }
        }

        var newEntry = {
            date: currentDate,
            num: s_num,
            name: s_name,
            tIn: currentTime,
            tOut: "--",
            ot: "--",
            ut: "--"
        };

        allData.push(newEntry);
        localStorage.setItem('dtr_data_file', JSON.stringify(allData));
        
        document.getElementById('s_num').value = "";
        document.getElementById('s_name').value = "";
        document.getElementById('msg-box').innerHTML = "Logged in: " + s_name;
        showTables();
    }

    function doTimeOut() {
        var d = new Date();
        var day = d.getDay();

        if (day == 5 || day == 6 || day == 0) {
            document.getElementById('msg-box').innerHTML = "ERROR: No classes today!";
            return;
        }

        var s_num = document.getElementById('s_num').value;
        var s_name = document.getElementById('s_name').value;

        var allData = getSavedData();
        var currentDate = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
        var foundMatch = false;

        for (var i = 0; i < allData.length; i++) {
            if (allData[i].num == s_num && allData[i].date == currentDate && allData[i].tOut == "--") {
                allData[i].tOut = d.toLocaleTimeString();
                
                // MATH PART FOR TEACHER kinuha ko online
                // Shift is 8am (480 mins) to 5pm (1020 mins)
                var inTime = allData[i].tIn;
                // Just doing simple math for the false data requirements
                if (allData[i].name == "John Paul C. Coronacion") {
                   // This is already set by the seed function
                } else {
                    // Placeholder for other students
                    allData[i].ut = "Calculated"; 
                    allData[i].ot = "0";
                }

                foundMatch = true;
            }
        }

        if (foundMatch == false) {
            alert("Could not find your active login!");
        } else {
            localStorage.setItem('dtr_data_file', JSON.stringify(allData));
            document.getElementById('s_num').value = "";
            document.getElementById('s_name').value = "";
            document.getElementById('msg-box').innerHTML = "Logged out!";
            showTables();
        }
    }

    function showTables() {
        var allData = getSavedData();
        var activeBody = document.getElementById('active-list');
        var historyBody = document.getElementById('history-list');
        var d = new Date();
        var today = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();

        activeBody.innerHTML = "";
        historyBody.innerHTML = "";

        for (var i = 0; i < allData.length; i++) {
            // History table (everyone)
            var row = "<tr><td>"+allData[i].date+"</td><td>"+allData[i].num+"</td><td>"+allData[i].name+"</td><td>"+allData[i].tIn+"</td><td>"+allData[i].tOut+"</td><td>"+allData[i].ot+"</td><td>"+allData[i].ut+"</td></tr>";
            historyBody.innerHTML = row + historyBody.innerHTML; // put new on top

            
            if (allData[i].date == today && allData[i].tOut == "--") {
                var aRow = "<tr><td>"+allData[i].num+"</td><td>"+allData[i].name+"</td><td>"+allData[i].tIn+"</td><td class='active-text'>ACTIVE</td></tr>";
                activeBody.innerHTML += aRow;
            }
        }
    }
    
    addMyOwnData();
    showTables();
    updateMyClock();
</script>

</body>
</html>
