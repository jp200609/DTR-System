<!DOCTYPE html>
<html>
<!-- JOHN PAUL CORONACION -->
<!-- 24-00376 -->
<head>
    <title>Coronacion DTR System</title>
    <style>
        body {
            background-color: #ff9999; /* light red */
            font-family: "Times New Roman", serif;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            background-color: white;
            width: 850px;
            margin-left: auto;
            margin-right: auto;
            border: 5px solid darkred;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            border-bottom: 2px solid red;
            margin-bottom: 20px;
        }

        .clock-display {
            background-color: #ffdada;
            border: 1px dashed red;
            padding: 10px;
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border: 1px solid black;
        }

        .data-table th {
            background-color: red;
            color: white;
            border: 1px solid black;
        }

        .data-table td {
            border: 1px solid gray;
            text-align: center;
            padding: 5px;
        }

        .my-button {
            padding: 10px;
            background-color: red;
            color: white;
            font-weight: bold;
            width: 120px;
            cursor: pointer;
        }

        .del-btn {
            background-color: black;
            color: white;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h1>Coronacion's Student Daily Time Record</h1>
        <p>Shift: Mon-Thu (8:00 AM to 5:00 PM)</p>
    </div>

    <div class="clock-display">
        <center>
            <h2 id="live-date">Date here</h2>
            <h1 id="live-time" style="font-size: 50px;">Time here</h1>
        </center>
    </div>

    <!-- This is where the student types their info -->
    <div style="background-color: #eeeeee; padding: 15px; border: 1px solid black;">
        <center>
            <div>
                Student Number: <input type="text" id="s_num">
            </div>
            <div style="margin-top:10px; margin-bottom:10px;">
                Full Name: <input type="text" id="s_name">
            </div>
            
            <div id="msg-box" style="color:red; font-weight:bold; margin-bottom:10px;"></div>

            <button class="my-button" onclick="doTimeIn()">TIME IN</button>
            <button class="my-button" onclick="doTimeOut()">TIME OUT</button>
            <!-- Note: Admin button only shows if I type the secret info -->
            <button id="admin-btn" class="my-button" style="background-color:gray; display:none;" onclick="showAdmin()">ADMIN MODE</button>
        </center>
    </div>

    <br>
    <h3>ACTIVE STUDENTS</h3>
    <table class="data-table">
        <tr>
            <th>Student No.</th>
            <th>Student Name</th>
            <th>In</th>
            <th>Status</th>
        </tr>
        <tbody id="active-list"></tbody>
    </table>

    <br>
    <h3>DTR HISTORY LOGS</h3>
    <table class="data-table">
        <tr>
            <th>Date</th>
            <th>Student No.</th>
            <th>Name</th>
            <th>In</th>
            <th>Out</th>
            <th>OT</th>
            <th>UT</th>
            <th id="admin-header" style="display:none;">Action</th>
        </tr>
        <tbody id="history-list"></tbody>
    </table>
</div>

<script>
    var isAdmin = false; // NOTE: This starts as false so students cant delete logs

    // kinopya ko clock part from a tutorial online
    function updateMyClock() {
        var now = new Date();
        document.getElementById('live-time').innerHTML = now.toLocaleTimeString();
        document.getElementById('live-date').innerHTML = now.toDateString();
        
        // WOW HACKERMAN: If I type the secret admin info, show the Admin button
        var user = document.getElementById('s_num').value;
        var name = document.getElementById('s_name').value;
        if(user == "ADMIN-000" && name == "Cash35JP") {
            document.getElementById('admin-btn').style.display = "inline";
        }
    }
    setInterval(updateMyClock, 1000);

    function getSavedData() {
        var stuff = localStorage.getItem('dtr_data_file');
        if (stuff == null) { return []; } 
        else { return JSON.parse(stuff); }
    }

    //gumawa ako fake data para example
    function addMyOwnData() {
        var allData = getSavedData();
        var found = false;
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].date == "2026-04-27" && allData[i].num == "24-00376") { found = true; }
        }
        if (found == false) {
            var myLog = {
                date: "2026-04-27", num: "24-00376", name: "John Paul C. Coronacion",
                tIn: "04:28 PM", tOut: "05:12 PM", ot: "12 mins", ut: "8 hrs 28 mins"
            };
            allData.push(myLog);
            localStorage.setItem('dtr_data_file', JSON.stringify(allData));
        }
    }

    // NOTE: This turns on the delete buttons
    function showAdmin() {
        isAdmin = true;
        document.getElementById('admin-header').style.display = "table-cell";
        document.getElementById('msg-box').innerHTML = "ADMIN MODE ACTIVE";
        showTables();
    }

    // NOTE: This function deletes one row from the list
    function deleteLog(index) {
        var allData = getSavedData();
        if(confirm("Delete this log?")) {
            allData.splice(index, 1); // This removes the item from the array
            localStorage.setItem('dtr_data_file', JSON.stringify(allData));
            showTables();
        }
    }

    function doTimeIn() {
        var d = new Date();
        var day = d.getDay(); 
        if (day == 5 || day == 6 || day == 0) {
            document.getElementById('msg-box').innerHTML = "No classes today!";
            return;
        }
        var s_num = document.getElementById('s_num').value;
        var s_name = document.getElementById('s_name').value;
        if (s_num == "" || s_name == "") { alert("Fill it up!"); return; }

        var allData = getSavedData();
        var currentDate = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
        
        var newEntry = {
            date: currentDate, num: s_num, name: s_name,
            tIn: d.toLocaleTimeString(), tOut: "--", ot: "--", ut: "--"
        };
        allData.push(newEntry);
        localStorage.setItem('dtr_data_file', JSON.stringify(allData));
        showTables();
    }

    function doTimeOut() {
        var d = new Date();
        var s_num = document.getElementById('s_num').value;
        var allData = getSavedData();
        var currentDate = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
        var found = false;

        for (var i = 0; i < allData.length; i++) {
            if (allData[i].num == s_num && allData[i].date == currentDate && allData[i].tOut == "--") {
                allData[i].tOut = d.toLocaleTimeString();
                allData[i].ut = "Checked"; 
                allData[i].ot = "0";
                found = true;
            }
        }
        if (!found) { alert("Login not found!"); } 
        else {
            localStorage.setItem('dtr_data_file', JSON.stringify(allData));
            showTables();
        }
    }

    function showTables() {
        var allData = getSavedData();
        var activeBody = document.getElementById('active-list');
        var historyBody = document.getElementById('history-list');
        var today = new Date().getFullYear() + "-" + (new Date().getMonth() + 1) + "-" + new Date().getDate();

        activeBody.innerHTML = "";
        historyBody.innerHTML = "";

        for (var i = 0; i < allData.length; i++) {
            // Build History Row
            var row = "<tr><td>"+allData[i].date+"</td><td>"+allData[i].num+"</td><td>"+allData[i].name+"</td><td>"+allData[i].tIn+"</td><td>"+allData[i].tOut+"</td><td>"+allData[i].ot+"</td><td>"+allData[i].ut+"</td>";
            
            // If admin is on, add a delete button
            if(isAdmin) {
                row += "<td><button class='del-btn' onclick='deleteLog("+i+")'>Delete</button></td>";
            }
            row += "</tr>";
            
            historyBody.innerHTML = row + historyBody.innerHTML; 

            if (allData[i].date == today && allData[i].tOut == "--") {
                activeBody.innerHTML += "<tr><td>"+allData[i].num+"</td><td>"+allData[i].name+"</td><td>"+allData[i].tIn+"</td><td style='color:green;'>ACTIVE</td></tr>";
            }
        }
    }

    addMyOwnData();
    showTables();
</script>

</body>
</html>
