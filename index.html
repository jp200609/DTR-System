<!DOCTYPE html>
<html>
<!-- JOHN PAUL CORONACION -->
<!-- 24 - 00376 -->
<head>
    <title>Coronacion's Student Daily Time Record</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --dark: #c92a2a;
            --bg: #fff5f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #ffc9c9;
        }

        h1 { color: var(--dark); text-align: center; }

        .clock-box {
            text-align: center;
            background: #ffe3e3;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #time-display { font-size: 3rem; font-weight: bold; color: var(--dark); }

        .input-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 8px;
        }

        input { padding: 10px; border: 1px solid #ffc9c9; border-radius: 5px; }

        .btn-row { text-align: center; margin-bottom: 20px; }

        button {
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: var(--dark); }

        .status-box {
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            background-color: #fffafa;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }

        th { background: var(--primary); color: white; padding: 12px; }

        td { border: 1px solid #ffc9c9; padding: 10px; text-align: center; background: white; }

        .active-tag { color: green; font-weight: bold; }
        .del-btn { background: black; font-size: 10px; padding: 5px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Coronacion's Student Daily Time Record</h1>

    <div class="clock-box">
        <div id="date-display">Date here...</div>
        <div id="time-display">00:00:00 AM</div>
        <p style="color:red; font-weight:bold;">Shift: Mon-Thu (8:00 AM - 5:00 PM)</p>
    </div>

    <!-- This is where the student types their info -->
    <div class="input-area">
        <input type="text" id="input_num" placeholder="Student Number">
        <input type="text" id="input_name" placeholder="Full Name">
    </div>

    <div class="btn-row">
        <button onclick="doTimeIn()">Time In</button>
        <button onclick="doTimeOut()">Time Out</button>
        <!-- Note: Admin button only shows if I type the secret info -->
        <button id="admin-btn" style="display:none; background:gray" onclick="activateAdmin()">Admin</button>
    </div>

    <div id="status-msg" style="text-align:center; color:red; font-weight:bold; margin-bottom:10px"></div>

    <div class="status-box">
        <h3 style="margin-top:0; color:var(--dark)">Current Active Students</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Time In</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="active-body"></tbody>
        </table>
    </div>

    <div class="status-box">
        <h3 style="margin-top:0; color:var(--dark)">DTR History Logs</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>ID</th>
                    <th>Name</th>
                    <th>In</th>
                    <th>Out</th>
                    <th>OT</th>
                    <th>UT</th>
                    <th id="admin-th" style="display:none">X</th>
                </tr>
            </thead>
            <tbody id="logs-body"></tbody>
        </table>
    </div>
</div>

<script>
    var isAdmin = false; // NOTE: This starts as false so students cant delete logs

    // kinopya ko clock part from a tutorial online
    function updateClock() {
        var d = new Date(); 
        document.getElementById('time-display').innerHTML = d.toLocaleTimeString();
        document.getElementById('date-display').innerHTML = d.toDateString();

        // WOW HACKERMAN: If I type the secret admin info, show the Admin button
        var s_num = document.getElementById('input_num').value;
        var s_name = document.getElementById('input_name').value;
        if (s_num == "ADMIN-000" && s_name == "Cash35JP") {
            document.getElementById('admin-btn').style.display = "inline-block";
        }
    }
    setInterval(updateClock, 1000);

    // This is where I load the data from the browser memor
    function getLogs() {
        var raw = localStorage.getItem('student_dtr_v6');
        return raw ? JSON.parse(raw) : [];
    }

    //gumawa ako fake data para example
    function seedData() {
        var allData = getLogs();
        var hasJP = false;
        var hasBen = false;
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].num == "24-00376" && allData[i].date == "2026-04-27") hasJP = true;
            if (allData[i].num == "24-00371" && allData[i].date == "2026-04-28") hasBen = true;
        }
        if (!hasJP) {
            allData.push({
                date: "2026-04-27", num: "24-00376", name: "John Paul C. Coronacion",
                tIn: "04:28 PM", tOut: "05:12 PM", ot: "12 mins", ut: "8 hrs 28 mins",
                raw: "2026-04-27T16:28:00"
            });
        }
        if (!hasBen) {
            allData.push({
                date: "2026-04-28", num: "24-00371", name: "Benxander",
                tIn: "04:57 PM", tOut: "05:12 PM", ot: "12 mins", ut: "8 hrs 57 mins",
                raw: "2026-04-28T16:57:00"
            });
        }
        localStorage.setItem('student_dtr_v6', JSON.stringify(allData));
    }

    // SECRET HAKERMAN: This turns on the delete buttons
    function activateAdmin() {
        isAdmin = true;
        document.getElementById('admin-th').style.display = "table-cell";
        document.getElementById('status-msg').innerHTML = "ADMIN MODE ACTIVE";
        refresh();
    }

    // NOTE: This function deletes one row from the list
    function deleteLog(idx) {
        var allData = getLogs();
        if (confirm("Delete this log?")) {
            allData.splice(idx, 1); // Removes the log from the array
            localStorage.setItem('student_dtr_v6', JSON.stringify(allData));
            refresh();
        }
    }

    function doTimeIn() {
        var d = new Date(); // shorthand for current date object
        var day = d.getDay(); // stores number 0-6 to check the day

        // Block login if it's Friday (5), Saturday (6), or Sunday (0)
        if (day == 5 || day == 6 || day == 0) {
            document.getElementById('status-msg').innerHTML = "No classes today!";
            return;
        }

        // Grab whatever the student typed
        var s_num = document.getElementById('input_num').value;
        var s_name = document.getElementById('input_name').value;
        if (s_num == "" || s_name == "") { alert("Fill in details!"); return; }

        var allData = getLogs();
        allData.push({
            date: d.toLocaleDateString(), num: s_num, name: s_name,
            tIn: d.toLocaleTimeString(), tOut: "--", ot: "--", ut: "--",
            raw: d.toISOString()
        });
        localStorage.setItem('student_dtr_v6', JSON.stringify(allData));
        refresh();
    }

    function doTimeOut() {
        var d = new Date(); 
        var s_num = document.getElementById('input_num').value;
        var allData = getLogs();
        var found = false;

        // Finding the right student who hasn't logged out yet
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].num == s_num && allData[i].tOut == "--") {
                allData[i].tOut = d.toLocaleTimeString();
                
                var inDate = new Date(allData[i].raw);
                var outDate = d;

                // NOTE: If they arrive between 7AM and 8AM, we treat it as 8AM sharp
                var hourIn = inDate.getHours();
                if (hourIn >= 7 && hourIn < 8) {
                    inDate.setHours(8,0,0);
                }

                // MATH PART KINUHA KO ONLINE: I converted clock hours to minutes to make it easier
                var targetIn = new Date(inDate); targetIn.setHours(8,0,0);
                var targetOut = new Date(inDate); targetOut.setHours(17,0,0);

                var utMins = 0; var otMins = 0;
                if (inDate > targetIn) utMins += (inDate - targetIn) / 60000;
                if (outDate < targetOut) utMins += (targetOut - outDate) / 60000;
                if (outDate > targetOut) otMins += (outDate - targetOut) / 60000;

                if (utMins > 0) {
                    var h = Math.floor(utMins / 60); var m = Math.floor(utMins % 60);
                    allData[i].ut = h + "h " + m + "m";
                }
                if (otMins > 0) {
                    var h = Math.floor(otMins / 60); var m = Math.floor(otMins % 60);
                    allData[i].ot = h + "h " + m + "m";
                }
                found = true;
            }
        }
        if (!found) alert("Login not found!");
        localStorage.setItem('student_dtr_v6', JSON.stringify(allData));
        refresh();
    }

    function refresh() {
        var allData = getLogs();
        var activeTable = document.getElementById('active-body');
        var logsTable = document.getElementById('logs-body');
        var d = new Date();
        var today = d.toLocaleDateString();

        //activetable = mga user still logged in
        //logstable = users logged out 
        activeTable.innerHTML = "";
        logsTable.innerHTML = "";

        for (var i = allData.length - 1; i >= 0; i--) {
            if (allData[i].date == today && allData[i].tOut == "--") {
                activeTable.innerHTML += "<tr><td>"+allData[i].num+"</td><td>"+allData[i].name+"</td><td>"+allData[i].tIn+"</td><td class='active-tag'>ACTIVE</td></tr>";
            }

            var historyRow = "<tr><td>" + allData[i].date + "</td><td>" + allData[i].num + "</td><td>" + allData[i].name + "</td><td>" + allData[i].tIn + "</td><td>" + allData[i].tOut + "</td><td>" + allData[i].ot + "</td><td>" + allData[i].ut + "</td>";
           // If admin is on, add a delete button
            if (isAdmin) {
                historyRow += "<td><button class='del-btn' onclick='deleteLog(" + i + ")'>DEL</button></td>";
            }
            historyRow += "</tr>";
            logsTable.innerHTML += historyRow;
        }
        if(activeTable.innerHTML == "") activeTable.innerHTML = "<tr><td colspan='4'>No students active.</td></tr>";
    }

    seedData();
    refresh();
</script>

</body>
</html>
