<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Cloud DTR</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-in { background-color: #10b981; color: white; }
        .btn-out { background-color: #ef4444; color: white; }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        th { background-color: #f1f5f9; }
        #loading-text {
            text-align: center;
            color: #64748b;
            font-style: italic;
            padding: 10px;
        }
    </style>

    <script>
        // ⚠️ Replace these with your actual credentials from JSONBin
        const API_KEY = "$2a$10$6sdqD84mGOrtV0iQCoqEiuwm6NLY/wQMAh7VUfRzQNiF13gTLRTaO";
        const BIN_ID = "69f6f08caaba88219766176c";

        // Read logs on startup
        document.addEventListener('DOMContentLoaded', fetchLogs);

        async function fetchLogs() {
            try {
                const response = await fetch(`https://jsonbin.io{BIN_ID}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = await response.json();
                const record = data.record || {};
                displayLogs(record.logs || []);
            } catch (error) {
                console.error("Error fetching logs:", error);
                displayLogs([]);
            }
        }

        async function logTime(type) {
            const now = new Date();
            const dateStr = now.toLocaleDateString();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const newEntry = { date: dateStr, time: timeStr, status: type };

            try {
                // 1. Get current data
                const getResponse = await fetch(`https://jsonbin.io{BIN_ID}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const getData = await getResponse.json();
                
                let currentLogs = [];
                if (getData.record && getData.record.logs) {
                    currentLogs = getData.record.logs;
                }

                // 2. Add new log to the top
                currentLogs.unshift(newEntry);

                // 3. Save it back to the cloud
                const updateResponse = await fetch(`https://jsonbin.io{BIN_ID}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                        "X-Bin-Private": "false"
                    },
                    body: JSON.stringify({ logs: currentLogs })
                });

                if (!updateResponse.ok) {
                    throw new Error("Cloud rejected the update.");
                }

                displayLogs(currentLogs);
            } catch (error) {
                console.error("Error saving log:", error);
                alert("Failed to reach cloud database. Check your keys or set your bin to Public!");
            }
        }

        function displayLogs(logs) {
            const logTable = document.getElementById('dtr-log');
            if (!logTable) return;
            logTable.innerHTML = '';
            
            if (logs.length === 0) {
                logTable.innerHTML = '<tr><td colspan="3" style="text-align:center;">No logs recorded yet.</td></tr>';
                return;
            }
            
            logs.forEach(log => {
                const row = `<tr>
                    <td>${log.date || ''}</td>
                    <td>${log.time || ''}</td>
                    <td style="color: ${log.status === 'IN' ? '#10b981' : '#ef4444'}; font-weight: bold;">
                        ${log.status || ''}
                    </td>
                </tr>`;
                logTable.innerHTML += row;
            });
        }
    </script>
</head>
<body>

<div class="container">
    <h2>Cloud DTR</h2>
    
    <div class="controls">
        <button class="btn-in" onclick="logTime('IN')">⏱️ Clock In</button>
        <button class="btn-out" onclick="logTime('OUT')">⏱️ Clock Out</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="dtr-log">
            <tr><td colspan="3" id="loading-text">Connecting to cloud storage...</td></tr>
        </tbody>
    </table>
</div>

</body>
</html>
