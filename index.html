<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ⚠️ REPLACE THE TWO STRINGS BELOW -->
    <script>
    const API_KEY = "$2a$10$6sdqD84mGOrtV0iQCoqEiuwm6NLY/wQMAh7VUfRzQNiF13gTLRTaO"; 
    const BIN_ID = "69f6f96c36566621a81c61f4";   
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Daily Time Record</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        h2 {
            margin: 0 0 8px 0;
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
        }
        #clock {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-secondary);
            background: #f8fafc;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        button:active { transform: translateY(0); }
        .btn-in { background-color: var(--success); color: white; }
        .btn-in:hover { background-color: #059669; }
        .btn-out { background-color: var(--danger); color: white; }
        .btn-out:hover { background-color: #dc2626; }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
            background: white;
        }
        th, td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }
        th { 
            background-color: #f8fafc; 
            font-weight: 700;
            color: var(--text-secondary);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8fafc; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-in { background-color: #d1fae5; color: #065f46; }
        .status-out { background-color: #fee2e2; color: #991b1b; }
        
        #loading-text {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>DAILY TIME RECORD</h2>
        <div id="clock">Loading Time...</div>
    </div>
    
    <div class="form-group">
        <label for="emp-name">Employee Name or ID</label>
        <input type="text" id="emp-name" placeholder="Enter your name or ID number">
    </div>
    
    <div class="controls">
        <button class="btn-in" onclick="clockIn()">⏱️ Clock In</button>
        <button class="btn-out" onclick="clockOut()">⏱️ Clock Out</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Hours Worked</th>
                </tr>
            </thead>
            <tbody id="dtr-log">
                <tr><td colspan="5" id="loading-text">Connecting to cloud storage...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Live Ticking Clock
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('clock').innerText = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function clockIn() { logTime('IN'); }
    function clockOut() { logTime('OUT'); }

    document.addEventListener('DOMContentLoaded', fetchLogs);

    // 2. Fetch and Render Logs
        async function fetchLogs() {
        const url = "https://jsonbin.io" + BIN_ID + "/latest";
        try {
            const response = await fetch(url, {
                method: "GET",
                headers: { "X-Master-Key": API_KEY }
            });
            
            if (!response.ok) {
                throw new Error("Cloud rejected fetch.");
            }
            
            const data = await response.json();
            
            if (data.record && data.record.logs) {
                displayLogs(data.record.logs);
            } else {
                displayLogs([]);
            }
        } catch (error) {
            console.error("Error fetching logs:", error);
            displayLogs([]);
        }
    }


    // 3. Log Logic (Solves the split issue & calculates hours)
    async function logTime(type) {
        const empName = document.getElementById('emp-name').value.trim();
        
        if (!empName) {
            alert("Please enter your Employee Name or ID first!");
            return;
        }

        const now = new Date();
        const dateStr = now.toLocaleDateString();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const url = "https://jsonbin.io" + BIN_ID;

        try {
            const getResponse = await fetch(url + "/latest", {
                method: "GET",
                headers: { "X-Master-Key": API_KEY }
            });
            const getData = await getResponse.json();
            
            let currentLogs = [];
            if (getData.record && getData.record.logs) {
                currentLogs = getData.record.logs;
            }

            // Find if this employee already has an open log for TODAY
            let existingIndex = currentLogs.findIndex(log => log.employee === empName && log.date === dateStr);

            if (type === 'IN') {
                if (existingIndex !== -1 && currentLogs[existingIndex].timeIn) {
                    alert("You have already clocked in for today!");
                    return;
                }
                
                const newEntry = { 
                    employee: empName, 
                    date: dateStr, 
                    timeIn: timeStr, 
                    timeInRaw: now.toISOString(), // Used for math
                    timeOut: null, 
                    hours: '--' 
                };
                currentLogs.unshift(newEntry);
            } 
            else if (type === 'OUT') {
                if (existingIndex === -1 || !currentLogs[existingIndex].timeIn) {
                    alert("You need to clock IN before you can clock OUT!");
                    return;
                }
                if (currentLogs[existingIndex].timeOut) {
                    alert("You have already clocked out for today!");
                    return;
                }

                // Update existing row with Clock Out and do the math
                currentLogs[existingIndex].timeOut = timeStr;
                
                const timeInObj = new Date(currentLogs[existingIndex].timeInRaw);
                const diffMs = now - timeInObj; // Difference in milliseconds
                const diffHrs = diffMs / (1000 * 60 * 60); // Convert to hours
                
                currentLogs[existingIndex].hours = diffHrs.toFixed(2) + " hrs";
            }

            // Save back to cloud
            const updateResponse = await fetch(url, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify({ logs: currentLogs })
            });

            if (!updateResponse.ok) throw new Error("Cloud rejected update.");

            displayLogs(currentLogs);
            alert(`Successfully clocked ${type}!`);
        } catch (error) {
            console.error("Error saving log:", error);
            alert("Failed to connect. Please check your keys!");
        }
    }

    // 4. Draw Modern Table
    function displayLogs(logs) {
        const logTable = document.getElementById('dtr-log');
        if (!logTable) return;
        logTable.innerHTML = '';
        
        if (logs.length === 0) {
            logTable.innerHTML = '<tr><td colspan="5" style="text-align:center;">No logs recorded yet.</td></tr>';
            return;
        }
        
        logs.forEach(log => {
            const row = `<tr>
                <td style="font-weight:600;">${log.employee || 'N/A'}</td>
                <td>${log.date || ''}</td>
                <td>${log.timeIn ? `<span class="status-badge status-in">IN</span> ${log.timeIn}` : '--'}</td>
                <td>${log.timeOut ? `<span class="status-badge status-out">OUT</span> ${log.timeOut}` : '--'}</td>
                <td style="font-weight:bold; color:var(--primary);">${log.hours || '--'}</td>
            </tr>`;
            logTable.innerHTML += row;
        });
    }
</script>

</body>
</html>
